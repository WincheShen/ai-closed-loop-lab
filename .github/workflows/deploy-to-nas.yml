name: Deploy to NAS

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
      - 'docker/**'
      - '.github/workflows/deploy-to-nas.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_KEY }}
          log-public-key: false

      - name: Add NAS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to NAS
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PATH: ${{ secrets.NAS_PATH || '/volume1/docker/ai-lab' }}
        run: |
          echo "🚀 部署到 NAS ($NAS_HOST)..."
          
          # 1. 确保远程目录存在
          ssh $NAS_USER@$NAS_HOST "mkdir -p $NAS_PATH/{data,logs}"
          
          # 2. 上传 docker-compose 配置
          scp docker/docker-compose.nas.yml $NAS_USER@$NAS_HOST:$NAS_PATH/
          
          # 3. 检查 .env 是否存在，不存在则创建模板
          ssh $NAS_USER@$NAS_HOST "
            if [ ! -f $NAS_PATH/.env ]; then
              echo '⚠️ .env 文件不存在，创建模板...'
              cat > $NAS_PATH/.env << 'ENVFILE'
          # AI Lab NAS 环境配置
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_VERSION=2025-03-01-preview
          DB_PATH=/app/data/central_brain.db
          WEBHOOK_AUTO_SMA_DISPATCH=false
          ENVFILE
              echo '✅ 已创建 .env 模板，请手动编辑添加其他配置'
            fi
          "
          
          # 4. 拉取镜像并启动
          ssh $NAS_USER@$NAS_HOST "
            cd $NAS_PATH
            echo '🐳 拉取最新镜像...'
            docker pull ghcr.io/wincheshen/ai-closed-loop-lab/trading-agent:latest
            
            echo '🚀 启动服务...'
            docker-compose -f docker-compose.nas.yml down webhook 2>/dev/null || true
            docker-compose -f docker-compose.nas.yml up -d webhook
            
            echo '🧹 清理旧镜像...'
            docker image prune -f
          "
          
          # 5. 健康检查
          echo ""
          echo "⏳ 等待服务启动..."
          sleep 5
          
          MAX_RETRY=5
          RETRY=0
          while [ $RETRY -lt $MAX_RETRY ]; do
            if curl -s --max-time 5 http://$NAS_HOST:8002/health > /dev/null 2>&1; then
              echo "✅ 服务启动成功！"
              echo ""
              echo "📋 访问地址："
              echo "   - 交易记录管理: http://$NAS_HOST:8002/ui/"
              echo "   - 策略选股:     http://$NAS_HOST:8002/ui/strategy.html"
              exit 0
            fi
            RETRY=$((RETRY+1))
            echo "⏳ 等待服务就绪... ($RETRY/$MAX_RETRY)"
            sleep 5
          done
          
          echo "⚠️ 服务可能尚未完全启动，请手动检查日志："
          echo "   ssh $NAS_USER@$NAS_HOST 'docker logs ai-lab-webhook'"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 部署失败！"
          echo "请检查："
          echo "   1. NAS SSH 密钥是否正确配置 (secrets.NAS_SSH_KEY)"
          echo "   2. NAS 主机地址是否正确 (secrets.NAS_HOST)"
          echo "   3. NAS 上 Docker 是否正常运行"
