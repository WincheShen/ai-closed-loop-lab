name: Build and Push TradingAgent Image

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout ai-closed-loop-lab
        uses: actions/checkout@v4

      - name: Checkout TradingAgents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TradingAgents
          token: ${{ secrets.PAT_TOKEN }}
          path: libs/tradingAgents_neo

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # GHCR 镜像名必须全小写
          tags: |
            ghcr.io/wincheshen/ai-closed-loop-lab/trading-agent:latest
            ghcr.io/wincheshen/ai-closed-loop-lab/trading-agent:${{ github.sha }}
